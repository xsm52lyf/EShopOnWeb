apiVersion: v1
kind: ConfigMap
metadata:
  name: corecommerce-web-config
  namespace: corecommerce
  labels:
    app: corecommerce-web
data:
  appsettings.Production.json: |
    {
      "Logging": {
        "LogLevel": {
          "Default": "Information",
          "Microsoft": "Warning",
          "Microsoft.Hosting.Lifetime": "Information"
        },
        "Console": {
          "FormatterName": "json",
          "FormatterOptions": {
            "TimestampFormat": "yyyy-MM-dd HH:mm:ss.fff",
            "UseUtcTimestamp": true
          }
        }
      },
      "EventBus": {
        "SubscriptionClientName": "CoreCommerce",
        "RetryCount": 5
      },
      "Catalog": {
        "PicBaseUrl": "https://static.corecommerce.local",
        "CacheExpirationMinutes": 10
      },
      "Performance": {
        "EnableResponseCompression": true,
        "EnableResponseCaching": true,
        "ResponseCacheDurationSeconds": 300
      }
    }