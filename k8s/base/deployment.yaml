apiVersion: apps/v1
kind: Deployment
metadata:
  name: corecommerce-web
  namespace: corecommerce
  labels:
    app: corecommerce-web
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: corecommerce-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: corecommerce-web
        version: v1
    spec:
      serviceAccountName: corecommerce-web-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 60
      
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for dependencies..."
              until nc -z -w 5 $DB_HOST $DB_PORT; do
                echo "Database not ready, retrying in 5s..."
                sleep 5
              done
              echo "Dependencies are ready!"
          env:
            - name: DB_HOST
              value: "localhost"
            - name: DB_PORT
              value: "5432"
      
      containers:
        - name: corecommerce-web
          image: corecommerce-web:latest
          imagePullPolicy: IfNotPresent
          
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: metrics
              containerPort: 8080
              protocol: TCP
          
          env:
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: app-settings
                  key: ASPNETCORE_ENVIRONMENT
            - name: ASPNETCORE_URLS
              valueFrom:
                configMapKeyRef:
                  name: app-settings
                  key: ASPNETCORE_URLS
            - name: ConnectionStrings__CoreCommerceDb
              valueFrom:
                secretKeyRef:
                  name: db-connection-secret
                  key: connectionString
            - name: Redis__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: redis-connection-secret
                  key: connectionString
            - name: DOTNET_SYSTEM_NET_HTTP_SOCKETSHTTPHANDLER_HTTP2UNENCRYPTEDSUPPORT
              value: "true"
            - name: DOTNET_GCHeapHardLimit
              value: "1C0000000"
          
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          
          startupProbe:
            httpGet:
              path: /health/startup
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - "sleep 30"
          
          volumeMounts:
            - name: app-config
              mountPath: /app/config
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: logs
              mountPath: /app/logs
      
      volumes:
        - name: app-config
          configMap:
            name: corecommerce-web-config
        - name: tmp
          emptyDir: {}
        - name: logs
          emptyDir: {}
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - corecommerce-web
                topologyKey: kubernetes.io/hostname